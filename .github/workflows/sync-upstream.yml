name: Sync upstream

on:
  schedule:
    # Every six hours, offset from the top of the hour to reduce scheduler delays.
    - cron: "37 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream-main
  cancel-in-progress: false

jobs:
  sync:
    if: github.repository == 'wilburx813/RPent'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Sync main from the parent repository
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh api \
            --method POST \
            "repos/${GH_REPO}/merge-upstream" \
            -f branch=main
